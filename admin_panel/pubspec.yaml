version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
